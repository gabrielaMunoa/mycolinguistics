<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    cursor: crosshair;
    font-family: 'Fira code', monospace;
  }

  .verso {
    position: absolute;
    color: rgba(255,255,255,0.2);
    white-space: pre;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: font-size 0.4s ease, color 0.6s ease;
    
  }

  .gota {
    position: absolute;
    width: 11px;
    height: 11px;
    background: cyan;
    border-radius: 50%;
    pointer-events: none;
    animation: caer 0.6s ease-out forwards;
  }

  @keyframes caer {
    0% {
      transform: translateY(-20px);
      opacity: 1;
    }
    100% {
      transform: translateY(0);
      opacity: 0;
    }
  }
</style>
</head>

let indice = 0;
let versosActivos = [];
let crecimientoGlobal = 0;

document.addEventListener("click", (e) => {

  // gota
  const gota = document.createElement("div");
  gota.className = "gota";
  gota.style.left = e.clientX + "px";
  gota.style.top = e.clientY + "px";
  document.body.appendChild(gota);
  setTimeout(() => gota.remove(), 600);

  // 🔹 tomar elemento en orden
  const item = secuencia[indice % secuencia.length];

  const verso = document.createElement("div");
  verso.className = "verso";

  verso.innerText = item.texto;

  if (item.tipo === "estrofa") {
    verso.style.whiteSpace = "pre";
  }

  verso.style.left = e.clientX + "px";
  verso.style.top = e.clientY + "px";

  // tamaño base
  verso.dataset.size = 13;
  verso.style.fontSize = "13px";

  document.body.appendChild(verso);
  versosActivos.push(verso);

  indice++;

  // crecimiento global
  crecimientoGlobal += 0.7;
  actualizarVersos();
});

function actualizarVersos() {
  versosActivos.forEach(v => {
    let base = parseFloat(v.dataset.size);
    let nuevoTam = base + crecimientoGlobal;

    v.style.fontSize = nuevoTam + "px";

    let opacidad = Math.min(0.9 + nuevoTam / 300, 1);
    v.style.color = `rgba(32,212,17,${opacidad})`;
  });
}

</script>
